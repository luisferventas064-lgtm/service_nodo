{% extends "base.html" %}

{% block title %}NODO Dashboard{% endblock %}

{% block content %}
<div style="margin:24px 0;">
  <h1 style="margin-bottom:30px;">NODO Internal Dashboard</h1>

  <div
    style="
      display:inline-block;
      background:white;
      padding:20px 30px;
      margin:10px;
      border-radius:10px;
      box-shadow:0 2px 6px rgba(0,0,0,0.1);
      min-width:200px;
    "
  >
    <div style="font-size:28px; font-weight:bold;">{{ providers }}</div>
    <div style="color:#666;">Providers</div>
  </div>

  <div
    style="
      display:inline-block;
      background:white;
      padding:20px 30px;
      margin:10px;
      border-radius:10px;
      box-shadow:0 2px 6px rgba(0,0,0,0.1);
      min-width:200px;
    "
  >
    <div style="font-size:28px; font-weight:bold;">{{ jobs }}</div>
    <div style="color:#666;">Jobs</div>
  </div>

  <div
    style="
      display:inline-block;
      background:white;
      padding:20px 30px;
      margin:10px;
      border-radius:10px;
      box-shadow:0 2px 6px rgba(0,0,0,0.1);
      min-width:200px;
    "
  >
    <div style="font-size:28px; font-weight:bold;">{{ clients }}</div>
    <div style="color:#666;">Clients</div>
  </div>

  <div
    style="
      display:inline-block;
      background:white;
      padding:20px 30px;
      margin:10px;
      border-radius:10px;
      box-shadow:0 2px 6px rgba(0,0,0,0.1);
      min-width:200px;
    "
  >
    <div style="font-size:28px; font-weight:bold;">{{ workers }}</div>
    <div style="color:#666;">Workers</div>
  </div>

  <div style="margin-top:30px;">
    <a
      href="/dashboard/marketplace/"
      style="
        background:#0b5cab;
        color:white;
        padding:10px 16px;
        text-decoration:none;
        border-radius:6px;
      "
    >
      Marketplace Analytics
    </a>
  </div>
</div>
{% endblock %}
