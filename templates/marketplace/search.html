{% extends "base.html" %}

{% block title %}Marketplace Search{% endblock %}

{% block content %}
<div class="container page">
<div class="card">
  <h2 class="card-title">Search Service</h2>
  <form method="get" action="{% url 'ui:marketplace_search' %}">

    <div style="margin-bottom:18px;">
      <label for="service_type" style="display:block; margin-bottom:6px; font-weight:bold;">Service Type:</label>
      <select id="service_type" name="service_type" style="width:100%; box-sizing:border-box; padding:10px; border:1px solid #d1d5db; border-radius:6px;">
        <option value="">Select</option>
        {% for service_type in service_types %}
          <option value="{{ service_type.service_type_id }}" {% if selected_service_type == service_type.service_type_id|stringformat:"s" %}selected{% endif %}>{{ service_type.localized_name }}</option>
        {% endfor %}
      </select>
    </div>

    <div style="margin-bottom:18px;">
      <label for="province" style="display:block; margin-bottom:6px; font-weight:bold;">Province:</label>
      <select id="province" name="province" style="width:100%; box-sizing:border-box; padding:10px; border:1px solid #d1d5db; border-radius:6px;">
        <option value="">Auto</option>
        <option value="QC" {% if selected_province == "QC" %}selected{% endif %}>QC</option>
        <option value="ON" {% if selected_province == "ON" %}selected{% endif %}>ON</option>
      </select>
    </div>

    <div style="margin-bottom:18px;">
      <label for="city" style="display:block; margin-bottom:6px; font-weight:bold;">City:</label>
      <input id="city" type="text" name="city" value="{{ selected_city }}" style="width:100%; box-sizing:border-box; padding:10px; border:1px solid #d1d5db; border-radius:6px;">
    </div>

    <div style="margin-bottom:18px; display:flex; gap:18px; flex-wrap:wrap;">
      <label>
        <input type="checkbox" name="only_certified" value="1" {% if request.GET.only_certified %}checked{% endif %}>
        Only certified
      </label>

      <label>
        <input type="checkbox" name="only_insured" value="1" {% if request.GET.only_insured %}checked{% endif %}>
        Only insured
      </label>
    </div>

    <div style="margin-bottom:18px;">
      <label for="zone_id" style="display:block; margin-bottom:6px; font-weight:bold;">Zone (optional):</label>
      <input id="zone_id" type="number" name="zone_id" value="{{ selected_zone|default:'' }}" style="width:100%; box-sizing:border-box; padding:10px; border:1px solid #d1d5db; border-radius:6px;">
    </div>

    <div style="margin-bottom:18px;">
      <label for="type" style="display:block; margin-bottom:6px; font-weight:bold;">Provider Type (optional):</label>
      <select id="type" name="type" style="width:100%; box-sizing:border-box; padding:10px; border:1px solid #d1d5db; border-radius:6px;">
        <option value="">All</option>
        <option value="company" {% if selected_type == "company" %}selected{% endif %}>Company</option>
        <option value="self_employed" {% if selected_type == "self_employed" %}selected{% endif %}>Self-employed</option>
      </select>
    </div>

    <div style="margin-bottom:18px;">
      <label for="order" style="display:block; margin-bottom:6px; font-weight:bold;">Order (optional):</label>
      <select id="order" name="order" style="width:100%; box-sizing:border-box; padding:10px; border:1px solid #d1d5db; border-radius:6px;">
        <option value="">Best Match</option>
        <option value="rating_desc" {% if selected_order == "rating_desc" %}selected{% endif %}>Highest Rating</option>
        <option value="price_asc" {% if selected_order == "price_asc" %}selected{% endif %}>Lowest Price</option>
        <option value="price_desc" {% if selected_order == "price_desc" %}selected{% endif %}>Highest Price</option>
      </select>
    </div>

    <button type="submit" style="background:#111; color:white; border:none; padding:10px 16px; border-radius:6px; cursor:pointer;">Search Providers</button>
  </form>
</div>
</div>
{% endblock %}
