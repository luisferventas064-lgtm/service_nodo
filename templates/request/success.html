{% load i18n %}
<!DOCTYPE html>
<html>
<head>
    <title>{% trans "Request sent" %}</title>
    <style>
        body { font-family: Arial; background:#f5f7fa; padding:40px; }
        .container {
            max-width:620px;
            margin:auto;
            background:white;
            padding:24px;
            border-radius:10px;
            box-shadow:0 3px 10px rgba(0,0,0,0.06);
        }
        a {
            display:inline-block;
            margin-top:16px;
            color:#111827;
            font-weight:bold;
            text-decoration:none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>{% trans "Request sent" %}</h2>
    <p>{% trans "Your request was registered and is now waiting for the provider response." %}</p>
    <a href="/marketplace/">{% trans "Return to marketplace" %}</a>
</div>

</body>
</html>
