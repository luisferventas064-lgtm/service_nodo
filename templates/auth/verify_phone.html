{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Verify Phone" %}{% endblock %}

{% block content %}
<div style="max-width:400px;margin:80px auto;text-align:center;">
    <h2>{% trans "Verify your phone number" %}</h2>
    <p>{% trans "Enter the verification code sent to your phone." %}</p>

    <form method="post">
        {% csrf_token %}
        <input type="text" name="code" placeholder="{% trans '6-digit code' %}" required style="padding:10px;width:100%;margin:15px 0;">
        <button type="submit" style="padding:10px 20px;">{% trans "Verify" %}</button>
    </form>

    {% if error %}
    <p style="color:#b91c1c; margin-top:12px;">{{ error }}</p>
    {% endif %}

    <div id="resendMessage" style="margin-top:15px; font-size:14px;"></div>

    <div style="margin-top:20px; text-align:center;">
        <button id="resendBtn" type="button" disabled style="padding:8px 16px;">
            {% trans "Resend code" %} (<span id="countdown">60</span>s)
        </button>
    </div>
</div>

<script>
const resendCodeLabel = "{% trans 'Resend code' %}";
const resendSuccessMessage = "{% trans 'A new verification code has been sent.' %}";
const resendFailureMessage = "{% trans 'Unable to resend code.' %}";
const resendNetworkMessage = "{% trans 'Network error. Please try again.' %}";
let seconds = 60;
const resendBtn = document.getElementById("resendBtn");
let countdownEl = document.getElementById("countdown");
const messageBox = document.getElementById("resendMessage");
const csrfToken = document.querySelector("[name=csrfmiddlewaretoken]").value;
let timer = null;

function startTimer() {
    if (timer) {
        clearInterval(timer);
    }

    resendBtn.disabled = true;
    seconds = 60;
    countdownEl.textContent = seconds;

    timer = setInterval(function() {
        seconds--;
        countdownEl.textContent = seconds;

        if (seconds <= 0) {
            clearInterval(timer);
            timer = null;
            resendBtn.disabled = false;
            resendBtn.textContent = resendCodeLabel;
        }
    }, 1000);
}

resendBtn.addEventListener("click", function() {
    resendBtn.disabled = true;
    messageBox.textContent = "";
    messageBox.style.color = "";

    fetch("{% url 'ui:resend_code' %}", {
        method: "POST",
        headers: {
            "X-CSRFToken": csrfToken
        }
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            messageBox.style.color = "green";
            messageBox.textContent = resendSuccessMessage;
            resendBtn.innerHTML = `${resendCodeLabel} (<span id="countdown">60</span>s)`;
            countdownEl = document.getElementById("countdown");
            startTimer();
        } else {
            messageBox.style.color = "red";
            messageBox.textContent = data.error || resendFailureMessage;
            resendBtn.disabled = false;
            resendBtn.textContent = resendCodeLabel;
        }
    })
    .catch(() => {
        messageBox.style.color = "red";
        messageBox.textContent = resendNetworkMessage;
        resendBtn.disabled = false;
        resendBtn.textContent = resendCodeLabel;
    });
});

startTimer();
</script>
{% endblock %}
