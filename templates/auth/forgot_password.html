{% extends "base.html" %}

{% block title %}Forgot Password{% endblock %}

{% block content %}
<h1>Forgot Password</h1>
<p>Enter your phone number and we will send a reset code.</p>

<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit">Send Reset Code</button>
</form>
{% endblock %}
