{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Forgot Password" %}{% endblock %}

{% block content %}
<h1>{% trans "Forgot Password" %}</h1>
<p>{% trans "Enter your phone number and we will send a reset code." %}</p>

<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit">{% trans "Send Reset Code" %}</button>
</form>
{% endblock %}
