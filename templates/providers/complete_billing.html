{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Complete Provider Billing" %}{% endblock %}

{% block content %}
<div class="card">
  <h2>{% trans "Complete Billing Information" %}</h2>

    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">{% trans "Save Billing Info" %}</button>
  </form>
</div>
{% endblock %}
