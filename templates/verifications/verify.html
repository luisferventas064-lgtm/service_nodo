{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Verify Phone" %}{% endblock %}

{% block content %}
<form method="post">
  {% csrf_token %}
  <input type="text" name="code" placeholder="{% trans "Enter code" %}" required />
  <button type="submit">{% trans "Verify" %}</button>
</form>

{% if error %}
<p style="color: red;">{{ error }}</p>
{% endif %}
{% endblock %}
